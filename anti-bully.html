<script>
const DATA = [{"url": "https://flipedu.parenting.com.tw/article/009683", "title": "老師如何處理霸凌？反霸凌教學資源與宣導素材一次看", "author": "劉茵琪", "date": "2024-11-14", "summary": "近年來，校園霸凌事件的通報數逐年增加，讓「反霸凌」成為教育界需重視的重要議題。老師如何在教學中融入反霸凌的討論？哪些宣導素材可以有效地向學生傳達反霸凌的理念？《翻轉教育》整理反霸凌教案、活動、PPT、海報等資源，提供老師們參考。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/WPXYlbo99BbjeJ5vOFF0JbLbHLfYAxvOPyXBaTMi.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010694", "title": "霸凌，不只是兩個人的事：從「霸凌圈」掌握早期預防與介入的3大關鍵", "author": "蔡政霖 / 菜桃老師", "date": "2026-03-26", "summary": "面對校園霸凌時，我們的視線往往聚焦在當事人間的衝突，但其實霸凌常常也是整個團體人際動力的結果。資深專輔老師菜桃老師分享「霸凌圈」模型，解析 8 種關鍵角色與介入重點，以及如何透過「改變霸凌圈分佈」達到早期預防的 3 個具體方向，協助老師鬆動霸凌結構，在日常中建立友善互助的班級文化。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/10GWF6R76S2kCH0Mrr6xJR4oOYdsFHnsytu2hZCX.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010736", "title": "在「開玩笑的啦」背後：如何從挑釁、騷擾行為，辨識霸凌早期警訊？", "author": "蔡政霖 / 菜桃老師", "date": "2026-04-14", "summary": "霸凌事件往往是漸進的過程，一開始隱藏在「開玩笑」下，當行為演變到具危害性時，已十分難處理。菜桃老師將霸凌行為前兆分為黃、橘、紅三區訊號，帶老師辨識不同年段出現的隱微挑釁與騷擾行為。而透過老師間的情報交換、跨課堂一致介入準則等，更有機會在傷害擴大前劃清界線、避免行為蔓延。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/lCqN698q0zNHuLD4vVszX1YIHgCHSoPNk6TCQPGk.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010442", "title": "發生校園事件導師完整SOP：霸凌與性平事件處理的十大核心步驟（附資源下載）", "author": "黃慧瑜（小魚老師）", "date": "2025-11-04", "summary": "校園霸凌與性平事件頻繁登上媒體版面，對學校與教師形成巨大壓力。本文從實務角度，提出十大核心步驟，協助導師迅速應對危機，避免違法與傷害擴大，兼顧學生保護與導師專業保障，是導師不可或缺的處理參考指引。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/5EsqeNw2aCbCnr59XpVQQkXBAw8QZjb8aB7VTuwF.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010721", "title": "七成疑似霸凌事件能和解！關鍵在於：家長願不願意放下「戰爭模式」", "author": "吳建鴻", "date": "2026-03-31", "summary": "當孩子受了委屈，家長的第一反應往往是急於為孩子討回公道。然而，這種「戰爭模式」是否真的能讓孩子的傷口癒合？全國家長團體聯盟吳建鴻副秘書長分享校園第一線觀察：七成霸凌案件其實能靠「調和」圓滿解決，打開孩子自癒與成長的大門；也邀請家長思考：在追求真相的同時，我們該如何陪伴孩子學會「修復關係」？", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/aR6dkTl5IKGZrV5e2OJ3VkFFol8JZzTc2jdwmZyX.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010522", "title": "北市知名私中驚傳霸凌，當學生衝突成為家庭角力，學校如何應對處理？", "author": "王韻齡", "date": "2025-12-12", "summary": "當私校發生學生之間的霸凌案，學校該把握哪些處理原則，謹慎應對，避免糾紛層級升高，演變成家長政經實力、資源的一場角力戰，造成對學生與教育現場更多傷害？《親子天下》採訪多位資深校長，分享經驗、提出的建議是⋯⋯", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/MB2ovyiBZ3Xm6mkja9ZrjjI8gkDt2uSJyuFZAu2Q.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/009791", "title": "「不只是找出帶頭者就能解決」霸凌，可能沒有大人想的那麼簡單", "author": "林維信", "date": "2025-01-09", "summary": "「只要抓出帶頭霸凌的人，問題就能解決？」霸凌的運作機制，可能比我們想得更複雜，團體氣氛與旁觀者的影響往往被忽視。林維信心理師剖析霸凌的心理與群體動態，提醒教育者應該關注班級文化的建構，並探討如何幫助孩子正視錯誤、避免霸凌持續循環。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/SJ3VGzGG4B45EClbwelzDeC4ld4zgdDMjqqoJZFs.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/009785", "title": "照顧班上的邊緣孩子：校外教學時的「人緣不好小隊」", "author": "大坦誠", "date": "2025-01-03", "summary": "作為教師最難的是，要顧及班上每個孩子的狀況，又不能明顯偏袒。尤其到了讓人頭痛的分組、校外教學等時刻，如何讓每個孩子不會感到邊緣、在團體生活中留下美好回憶？大坦誠分享他的獨特新法。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/T5pkA6uB6FDWu7Ss28kMecA3xqO5EOzBVqcmdU1s.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008558", "title": "南韓嚴法反讓霸凌更棘手，他們如何透過「修復式學校」翻轉校園現狀？", "author": "潘乃欣", "date": "2023-08-22", "summary": "南韓校園霸凌防制法律愈修愈嚴，但校園氣氛不見得更友善。民間團體近年催生「修復式學校」來解決問題，這樣的學校教什麼？《親子天下》獨家紀錄韓國修復式正義協會會長李在永，今（2023）年8月來台第一人稱演講精華。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/UkiPHM7LIYvFrhO855NC9qXU2nD9v8izWpavrxJS.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008599", "title": "如何修復關係霸凌中受傷的彼此？從修復性觀點進行學生輔導5要點", "author": "杜淑芬", "date": "2023-09-01", "summary": "關係霸凌經常見於青少年之間，霸凌者藉由貶抑另一方、壓制另一方的人際關係，達到自我滿足，但自身也常在其他重要人際關係有受害經驗。中原大學教育研究所教授杜淑芬從心理治療的「修復性經驗」觀點，示範關係霸凌的輔導實例，進而引導學生培養正向的人際經驗。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/Z9EP44arkifoFfQ1GCFxhaixgaxPCadyrZcdZ2eV.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008579", "title": "台北市議員苗博雅：面對霸凌事件，支持和輔導孩子心理的難處，才是最重要的", "author": "賓靜蓀", "date": "2023-08-28", "summary": "處理霸凌事件，大人可能爭的是程序正義、誰對誰錯，但更重要的，是如何支持和輔導牽涉其中孩子的心理需要，不論是霸凌或被霸凌的孩子，都值得更多資源、專業人力的投入，台大法律系畢業的台北市議員苗博雅這樣說⋯⋯", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/VdSZjvNNtXMdyVYQ7WWyN47qVCuP7CIlhKILVgvO.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008606", "title": "無意識卻深具殺傷力｜沒剎車的微歧視如何變霸凌？", "author": "潘乃欣", "date": "2023-09-01", "summary": "亞洲每十個學生，就有三人曾遭校園霸凌。暴力非天生，霸凌其實始於無意識，甚至以善意包裝而成的「微歧視」。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/SVCAD6Y7aO3IeEAuRB1NLCy6Pd1GArjGGKz5PhUy.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008608", "title": "24小時新人際關係｜網路點燃永不休息的欺負！", "author": "潘乃欣", "date": "2023-09-01", "summary": "當孩子人手一機，網路讓霸凌時間更長、行徑更兇狠，且常模糊加害與被害者界線。捲入霸凌事件的學生、家長、老師，如何面對比過往更棘手的困境？", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/5RvHJeFiN9Eqzuy1japzzeXCJjvQCNFV8gBkToKr.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008610", "title": "當霸凌發生後｜兒盟邱靖惠：進入調查前，值得思考的３件事", "author": "陳奕安", "date": "2023-09-01", "summary": "曾陪兩個兒子走過衝突事件，長期擔任霸凌事件調查小組委員的兒福聯盟研發組督導邱靖惠提醒，不是所有霸凌事件都該走調查流程，應把孩子利益放在第一位。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/2iteRZsSN5US7KADjR0GsiUQdFl2EyB4CzKJNUzo.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008600", "title": "師對生霸凌最重可解聘｜如何拿捏管教界線？", "author": "潘乃欣", "date": "2023-09-01", "summary": "教育部今年修法，未來教師涉及霸凌學生，最嚴重恐丟掉飯碗。究竟怎麼做算合法管教，怎麼做已涉踩霸凌紅線？專家建議老師從兩個原則來檢視。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/aGvf7N77mNghlDMCGY4ofg2cdfRwdX0S0Iq1cCZ2.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008611", "title": "通報無助於關係的修復｜處理霸凌重點不在問審，而是教育", "author": "蘇岱崙", "date": "2023-09-01", "summary": "當霸凌行為人只關注如何為自己「脫罪」，受凌者受到的傷，就無法修復。校園霸凌發生後正是親、師、生共同學習五大重要人際課題的關鍵時刻。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/iqhLIduCJB2jJOKBuILD9qkBdCYWtokL8zwUhdnb.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008612", "title": "友善校園課題1：如何教反歧視、養出同理心？｜在日常的每一天，學習尊重差異", "author": "親子天下媒體中心", "date": "2023-09-01", "summary": "尊重、包容是一輩子都用得上的能力，卻不在學校課表上。若想教反歧視、培養同理心，生活中的機會教育是最好的教室。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/U45A8tbCt7tRGgdIJbaumRQRe0475levQXdeANwD.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008613", "title": "台中市明道中學 原住民轉型正義課：你的玩笑是我的傷害", "author": "張文華", "date": "2023-09-01", "summary": "明道中學教師蔡明恆推動「原住民轉型正義」課程，帶領學生踏查部落、研究各國原住民處境。學生反思，曾以為的幽默，原來是一種族群歧視。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/5n2J4sRcXalVgx4H1eTPUPc5GKc3G4vfGsBHX7vQ.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008614", "title": "友善校園課題2：校園衝突難化解？｜用善意和對話重啟溝通", "author": "潘乃欣", "date": "2023-09-01", "summary": "衝突常來自人總以自身角度發言，忽略另一方想的和自己不一樣。第一線老師分享兩種溝通方式，引導學生練習有話好好說。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/FXAvCvahyGMdZ91XBKDXOEiq0PddsUPDinwGtcHQ.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008615", "title": "友善校園課題3：面對霸凌、受凌者心傷｜用鼓勵傾訴接住「急性期」負面情緒", "author": "陳奕安", "date": "2023-09-01", "summary": "學生間的人際衝突與摩擦，在教學現場層出不窮。面對心中充滿負面情緒的霸凌者、受凌者，家長、老師如何應對孩子的委屈？針對霸凌者、受凌者的不同輔導該怎麼做？諮商心理師、專任輔導老師分享溝通時注意事項，從事發初期的當事人溝通關鍵，到進行班級輔導的技巧等。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/qF07I8mMUYrt5qU1forozHRxkcDZrfaf73XJurM7.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008616", "title": "友善校園課題4：特殊生容易被霸凌怎麼辦？｜練習社交技巧，學習應對衝突", "author": "陳奕安", "date": "2023-09-01", "summary": "特生具有容易遭霸凌的特質，曾有調查發現，特生遭受霸凌比例是普通生同儕的六倍，專家建議四招，提早佈局、避免特殊生受凌狀況發生。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/osmKsnAcPOOmv2m2Oh6YuxKaUAwpnIf0QM3RV3Az.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008617", "title": "霸凌風暴中，親師不知所措的13個問題", "author": "蘇岱崙", "date": "2023-09-01", "summary": "校園霸凌發生時，從老師到霸凌者、受凌者、家長四方都承受著壓力，事件發生時，最困擾的問題常沒有標準答案，專家們的建議提供霸凌事件處理的參考。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/mHq8529zhYexXWMkWZz54S52ELGSvZeZIwMcjSOo.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008618", "title": "如何平息教室裡的小火山？｜老ㄙㄨ老師課堂演練，帶學生換位思考", "author": "蘇岱崙", "date": "2023-09-01", "summary": "同學間的衝突排擠常是霸凌前部曲，台中市大元國小教師蘇明進（老ㄙㄨ老師）以三種真實課堂活動練習，讓每次衝突，變成孩子學同理的好機會。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/atfiVYtChXiGwxLnHRDnCd4VCLpRBdVW7rCSs2WA.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008619", "title": "從書籍、影片、桌遊學相處｜分齡互動資源，從小培養健康人際力", "author": "蘇岱崙", "date": "2023-09-01", "summary": "霸凌常始自孩子不知如何接受與自己不同的人，不妨避開大道理，在故事和遊玩中建立互動技巧。《親子天下》邀請各界專家推薦，透過書籍、影片、桌遊，在家庭與教室裡實際運用，不同年齡階段的孩子都可練習培養健康人際力，減少校園霸凌發生。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/cKEktnq7JYo3v45vIa68Srb5XgopfMTyNozxybx8.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008607", "title": "7組數字，透視全球到台灣霸凌趨勢（文末含完整圖文下載）", "author": "潘乃欣", "date": "2023-09-01", "summary": "遭受霸凌會導致閱讀等學科成績下滑？幾歲學生最常遭霸凌？校園裡最常發生哪類霸凌？7組關鍵數字，一次掌握全球到台灣霸凌樣貌。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/0SZTemFhjK76SAAn62kOttwikP7qOecmdsHgNuZw.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008609", "title": "新版《校園霸凌防制準則》公布 校園霸凌調查，家長、學校應做哪些事？（完整流程圖文內容下載）", "author": "潘乃欣", "date": "2023-09-01", "summary": "《校園霸凌防制準則》中，「霸凌」指符合以言語等樣態侵犯、故意為之、持續多次、對他人造成身心等損害的行為。一項衝突是否屬校園霸凌，要經4階段處理流程，約花1到6個月不等來判定。高中以下學校發生疑似學生對學生霸凌時，學校、家長、學生各要做哪些事？", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/KK2f3Kvrecma8K6581xxcauUmIFTBDxjsC6OwuLt.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/teacher_resource/225", "title": "《學校有一隻大狐狸》繪本閱讀學習單：教孩子遠離霸凌、保護自己！", "author": "", "date": "", "summary": "", "image": "https://flipedu-cdn.parenting.com.tw/authors/thumbnail/v7ON58nEJOaL70QsadAGDt6psgIc9wzoPEt9sNa8.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/teacher_resource/5722", "title": "404", "author": "", "date": "", "summary": "", "image": "", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/004316", "title": "老師，我被霸凌過，小一被關過廁所半天⋯⋯", "author": "宋怡慧", "date": "2018-01-09", "summary": "「老師，老師……」女孩在連叫了宋怡慧老師好幾聲後，開始崩潰大哭。宋怡慧老師拍了拍她的肩膀，靜靜感受她的暗黑與無力，想辦法要把她從情緒的黑洞拉出來。", "image": "https://flipedu-cdn.parenting.com.tw/image/article/2018-01-16/f586b3d8f2fc33dc8f3f7fa92f258a9d-194838.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/005937", "title": "被霸凌者的眼淚：別再跟孩子說「不要理他們就好了！」", "author": "海苔熊", "date": "2020-06-02", "summary": "海苔熊回想自己在擔任老師時，遇到學生被霸凌的狀況，那時自己既沒有「處理掉」班上欺負他的人，也沒有減少他被罵肥豬的頻率，為什麼後來很少聽到孩子再來抱怨，也比較常看到他開懷的笑臉？這個問題他思考了好幾年，直到最近才發現答案是「什麼」。", "image": "https://www.parenting.com.tw/files/md5/0c/79/0c79d7890c6c196ed34385df88955660-22529.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008048", "title": "談兒子遭霸凌，神老師：錯過了青春期，很多事情就回不去了", "author": "沈雅琪（神老師）", "date": "2023-02-10", "summary": "校園霸凌事件層出不窮，許多孩子因此身心受影響甚至不幸輕生。擁有31萬粉絲的沈老師沈雅琪，在新書《誰的青春不叛逆》中分享兒子曾在校受到導師和同學集體霸凌，最後她選擇幫孩子斷開壞連結，提醒父母在遇到孩子遭受惡意對待時，一定要為他們挺身而出。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/WKkGFZZ9NAEPxkdd0jxdury2cgV89q9xyW0fcE2k.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/006545", "title": "日本校園霸凌低齡化成警訊，小二生成霸凌高峰群", "author": "施逸筠", "date": "2021-05-04", "summary": "「同學把我當空氣，像是根本沒有我這個人一樣。有時會把我的東西藏起來，到處造謠，謠傳一些我根本沒說過的話。當然偶爾也有拳腳相向的暴力行為，但更常出現的是這種無視我、惡作劇的霸凌，它隨時存在，根本無法擺脫。」 曾在國小二年級被霸凌、現已活躍於電競產業的永...", "image": "https://www.parenting.com.tw/files/md5/23/57/2357e542045cef9298e2a181c52dca6e-375063.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/005364", "title": "「一個班平均有2人不喜歡你」社會學看青少年霸凌：如宮鬥般殘酷", "author": "親子天下", "date": "2019-04-30", "summary": "青少年霸凌如宮鬥般殘酷，師長要先了解學生間的友誼關係。中研院研究員吳齊殷和他的團隊觀察全台1077名國、高中生求學期間的友誼網絡動態變化，用社會學知識解析師長處理霸凌現象時，容易忽略或誤解的部分。", "image": "https://www.parenting.com.tw/files/md5/b3/99/b39974396d3d5552cbad9720130d2874-153568.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/007165", "title": "投書》是告訴，不是告密：專輔老師的霸凌事件處理方法分享——另類同儕法", "author": "賴冠宏", "date": "2022-03-14", "summary": "老師如何處理霸凌？當班級中發生霸凌事件，有些老師選擇積極幫助受害者、公然教訓同學，反被全班霸凌。長期擔任專輔老師的興福國中郭幸怡老師分享自己的觀察，處理霸凌時也得站在加害者的初衷思考，以免師生關係對立、引起更大反彈。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/SyijZiMJMniYWEDvhSPASnJdi2FfN3597hBDqkQD.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/007620", "title": "一直替同學亂取不雅綽號算不算霸凌？老師家長該留意的霸凌誤區", "author": "陳利銘", "date": "2022-09-12", "summary": "霸凌一詞在校園中經常被誤用，並非所有的學生衝突、師生衝突都可被稱為霸凌，也不是由單方的說法就可界定某衝突是霸凌事件。儘管在教育部的官方定義下，也經常出現判斷誤區，透過案例探討，一起來關心校園的霸凌問題。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/VoWHhe5LnEeCB7E8uuFzXVtYV0g1tk3U7UIM46im.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/006740", "title": "為何許多校園霸凌事件中，該好好處理的老師卻成幫兇？", "author": "蔡淇華", "date": "2021-08-10", "summary": "一位因兒子被霸凌痛徹心扉的母親，含淚寫信給蔡淇華老師。其實許多老師每年都有機會收到這樣的信、或聽過類似的故事，蔡老師在提供老師處理霸凌的5項具體建議。", "image": "https://flipedu-cdn.parenting.com.tw/image/article/2021-10-13/52ac449730f28512b45afe5f0316c42a-243098.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/004062", "title": "無法改變受到霸凌的過去，但能引導霸凌之後的選擇", "author": "吳緯中", "date": "2017-10-30", "summary": "校園的霸凌事件，早就不是新鮮事；新鮮的是，網路時代讓霸凌的第一手現場畫面，搬到了你我的眼球前，沒日沒夜，讓人們親眼目睹霸凌凶暴的過程，於是我們更難以抹除遺留在腦海中的陰影。", "image": "https://flipedu-cdn.parenting.com.tw/image/article/2017-10-30/a398955e20519bf0feb27f9c3d21d863-241508.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/006130", "title": "「不喜歡他的請舉手」一場引導孩子同理的對話 制止關係霸凌的發生", "author": "黃俊堯", "date": "2020-09-10", "summary": "校園霸凌層出不窮，就算沒有肢體衝突，關係霸凌也可能成為孩子一輩子的陰影。一名老師在社群分享曾經在教室觀察到當單一孩子遭排擠時，他如何用對話引導同學同理他人處境，過程令人動容。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/PnWfBAF4jHWYDhZGeOjxm4Kn2jj2qzLINiYsVva7.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/007912", "title": "不止於為被排擠的同學挺身而出，老師一步步引導教出同理心班級", "author": "老ㄙㄨ", "date": "2022-12-22", "summary": "老ㄙㄨ老師分享近期處理班級同學們共同排擠一位同學的狀況，讓不少家長老師直呼溫暖、感動。一起看看老師是如何從同理心引導開始，最後在班級歲末的「愛的信箱」活動中，看見孩子們的改變。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/GsFN8niVOcXdh0Y3QsDPCeboIye8z6L8gUU6phz9.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/006478", "title": "老ㄙㄨ老師：老師的同理心，是教室內公平的關鍵", "author": "老ㄙㄨ", "date": "2021-04-05", "summary": "一個班級中這麼多的學生，老師該怎麼做才能營造「公平」的班級氛圍，隨著教書愈來愈多年，老ㄙㄨ老師漸漸發現， 因為曾經歷過不愉快的童年經歷， 讓他變成一個比較能從學生角度來思考的老師，他認為，老師的同理心是關鍵。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/8ZxTZRy7MLqbra2wUSPPtH0FfWTF9BBS5SKmRHgW.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/006439", "title": "不想離開「兔子洞」的愛麗絲——《別告訴愛麗絲》", "author": "黃愛真", "date": "2021-03-15", "summary": "《別告訴愛麗絲》描述從被霸凌孤立到學會原諒，一趟穿越現實與奇境的異想旅程。有深度但無難度，是一本適合10~15歲青少年閱讀、關於霸凌和其影響的當代故事。黃愛真老師分享她的閱讀心得。", "image": "https://flipedu-cdn.parenting.com.tw/image/article/2021-03-15/444fb913deaea4d2f482029592f6ffe8-170764.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008212", "title": "面對「新時代霸凌」的處理方式：3要與3不要", "author": "黃敦晴", "date": "2023-04-10", "summary": "霸凌的樣貌，隨著時代在改變。當今的霸凌，在霸凌者動手或口出惡言之前，就已經開始、造成傷害了，而且內涵與形式也都不同。師長們要如何對新時代的霸凌洞燭機先？有哪些老掉牙的方式早就不管用了？", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/dNShFLR3go1NGH27EjFtLD63zpE2OwBY9s2W8dYq.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008390", "title": "阻止網路仇恨言論 成為數位正義聯盟的一員", "author": "曾多聞", "date": "2023-06-15", "summary": "電影裡的正義聯盟，是蝙蝠俠和神力女超人。真正的正義聯盟，是會挺身對抗霸凌、阻止仇恨言論、發揮同理心的人。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/hzcUm1lNcOxqoq1LCh89kRO3GQZj6KcJii9tU4jC.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/000146", "title": "預防校園霸凌，老師該怎麼做？", "author": "親子天下", "date": "2015-01-12", "summary": "校園霸凌幾乎每天上演，若情節不重，身為教師的確可以憑藉一些技巧來處理，但如果只能被迫在後端處理已發生的霸凌，總讓人疲於奔命。預防更勝事後處理，本文針對整體環境、霸凌者、被霸凌者及旁觀者四部分給予建議。", "image": "https://flipedu-cdn.parenting.com.tw/image/article/2017-10-24/4eee4b044220f5f1951bea0b012d3800-133840.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/000982", "title": "如何教國小孩子交朋友、建立人際關係？9堂校園人際課", "author": "蘇岱崙", "date": "2015-04-26", "summary": "小學生的人際關係如何著手？學校就是小社會，是孩子遭遇各種人際關係題的第一個場域。被排擠、被同學罵怎麼辦？想交朋友、加入同學的小圈圈怎麼做？這些人際課題在課表裡看不到，在人生路上卻比任何一門認知學科都重要。", "image": "https://flipedu-cdn.parenting.com.tw/image/article/2017-04-06/92b2b3e6dcce6790a61cf7430104b96b-181999.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/001677", "title": "老師！你也可以這樣做！－淺論對霸凌的認識與對策", "author": "親子天下", "date": "2015-10-29", "summary": "三重「城市之窗」文學獎，有一名國際婚姻家庭的第二代，以真情流露的「我是混血兒」散文，獲得這項文學比賽的國中組佳作，可是從文章的內容，我們有覺察到他被霸凌嗎？或許有人認為，這只是人際關係不佳，要像八德國中的例子，被集體暴力威脅，才算是霸凌？ 霸凌，係...", "image": "https://flipedu-cdn.parenting.com.tw/upload/2015_10_30_10_10_46.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/003422", "title": "青少年快樂嗎？OECD：青少年主要壓力來源是霸凌", "author": "親子天下", "date": "2017-05-08", "summary": "作者：田育瑄", "image": "https://flipedu-cdn.parenting.com.tw/image/article/2017-05-08/9ba29967752d1f9d9dd466621d43aa44-216634.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/005832", "title": "青少年愈在乎社交衝突，大人愈該讓孩子打自己的仗！", "author": "曾多聞", "date": "2020-04-22", "summary": "", "image": "https://www.parenting.com.tw/files/md5/5c/5f/5c5fbfa9d36829649eac1e2eb2c76d35-298164.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008475", "title": "學生衝突處理：老師如何面對學生衝突，與孩子、家長溝通？", "author": "李佩芬", "date": "2010-09-05", "summary": "學生衝突處理，老師可以怎麼做？學生因故打架而掛彩，家長心疼孩子到校討公道⋯⋯類似的學生衝突問題層出不窮，老師可以如何處理與避免？ 專家建議：打從新學期親師座談會，就是學生衝突處理的最佳起點。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/RExoaus0yaZutQP73XeBNGyFYFlpMW2AwlJod7LN.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010043", "title": "從公親到事主：教師校園衝突中的溝通藝術", "author": "律師帶您看校園裡的大小事", "date": "2025-05-08", "summary": "老師處理學生衝突是日常工作中難以避免的一環，但一句話說錯，往往就可能讓情勢升溫、關係破壞。長期協助教師和學校處理校園管教、體罰、霸凌和性平等案件的律師，在本文深入剖析教師在校園衝突中常見的溝通地雷，並提供實用對話建議，協助老師在應對情緒張力時，維持專業，穩住局勢。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/6ZdFA6r0dFFjoKIkmNcRKr2eTwEnPvf68QXtUgX6.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008372", "title": "孩子稍有衝突家長就要求國賠合理嗎？校園國賠事件的界定【請問駐站律師】", "author": "法老王律師", "date": "2023-06-08", "summary": "在教學現場，可能不時會碰到有一款家長，只要自己的小孩和其他同學發生衝突受傷，不管三七二十一誰對誰錯，第一個喊著就是要「國賠」。冤有頭債有主，究竟，國賠構成的條件是什麼？公私立學校的老師在碰到什麼情況下，會需要特別留意國賠的界定？", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/QmkqidckzVsPyc77aca37RvPVQr69hrn5c3aLheT.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008829", "title": "「我想要感謝，更勝道歉」處理孩子衝突，將指責化為感謝的引導對話法", "author": "林維信", "date": "2023-12-08", "summary": "孩子之間的相處，難免發生衝突，大人可以如何聰明的處理、引導對話，不只平息糾紛，更讓衝突成為寶貴的學習，協助孩子人際成長？", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/okhWCOAkw5DC4jwlEklaKNHRjDh0RCR0Loc8WhBX.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008088", "title": "復盤拆解T1職籃衝突事件，避免情緒衝突擴大的3個學習", "author": "曲智鑛", "date": "2023-02-22", "summary": "【曲智鑛專欄】T1 職業籃球聯盟19日發生聯盟史上最嚴重衝突，2隊共12人遭到驅逐出場，無論對於直接目睹球場衝突或透過轉播畫面接收訊息的青少年們，除了多了一個茶餘飯後的話題外，還可以如何引導，從中學習？曲智鑛老師透過球員專訪的對話，帶孩子們理解衝突情緒是從何而來？在競爭環境中又該如何保護自己？", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/IVOPDivgiQgCtNye0igr4B9pIj8BOBupcyFZbJrm.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010150", "title": "一句話就開戰、衝突變霸凌⋯直擊國中生衝突現場：衝突化解停看聽", "author": "邱苡涵 Annie Chiu", "date": "2025-06-19", "summary": "國中生常因一句話、一個眼神而爆發衝突，背後其實藏著未被理解的情緒與困惑。專任輔導教師分享多年校園經驗，協助學生拆解心結、修復關係，將衝突轉化為學習人際理解的契機。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/rzrCQ0Bw0VZDwJzdynDTZ3lneyqYU9U7gdo4SPrU.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010213", "title": "導師如何處理衝突？維持公平不容易，先學會面對情緒", "author": "葉奕緯", "date": "2025-07-18", "summary": "導師在班級經營中的最大挑戰，往往是學生衝突中的「公平」與「理解」。當孩子帶著情緒前來訴說，老師不只是仲裁者，更要擔任傾聽與修補的角色。葉奕緯老師分享他如何運用「不嚴重可言重、很嚴重該延仲」的處理原則，引導孩子看見行為背後的需求，從一次次的人際調解中，培養同理心與自我覺察，實踐師生共同的成長修煉。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/OUTTZlYs3veqR0YoWLDhqQdzq80u9mYZ1nHLvnot.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010502", "title": "掌握SEL，開啟青少年對話鑰匙：用時間軸與情緒光譜帶班級走出衝突", "author": "KIST", "date": "2025-12-01", "summary": "在教室裡，衝突往往來得又急又猛，老師卻常在第一線承接孩子的情緒洪流。面對激烈的肢體與語言對立，我們需要的不只是紀律處理，更是引導孩子理解自己與他人的專業策略。本文分享一次班級衝突後的真實操作，運用「時間軸」與「情緒光譜」協助學生覺察、整理、修復關係。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/KWFCc8ZJcbk9kYGqlATYtpRm6UNPoVnRnNG4Xo4E.png", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/010659", "title": "老是在處理學生告狀？SEL引導帶你看懂「告狀」的真相", "author": "黃慧瑜（小魚老師）", "date": "2026-03-08", "summary": "「老師，XXX弄我！」在小學與幼兒園裡幾乎天天上演，這些看似瑣碎的告狀，其實藏著孩子的情緒需求。小魚老師從社會情緒學習（SEL）五大核心出發，把告狀轉化為情緒教育契機，培養孩子表達感受、溝通期待與負責決策的能力。", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/cmD2zIHg9IST0jWfw42zdtboos9ngJNGPZOOQDWi.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008709", "title": "告狀六步驟，讓學生練習表達感受（附告狀單模板下載）", "author": "黃慧瑜（小魚老師）", "date": "2023-10-12", "summary": "「老師！」「老師！」當你忙著改聯絡簿或準備衝去下一堂課的教室時，被學生的聲聲告狀糾纏心裡是否煩躁不安？ 小魚老師因此設計了告狀單。透過告狀單的撰寫，孩子能夠安靜下來思索發生什麼事情，以及在這件事上自己的感受到底是什麼？", "image": "https://flipedu-cdn.parenting.com.tw/articles/cover/i7jGjg7MbYpNuG2JyMErmTGyVogS2u2QNg3DPW4I.jpg", "tags": ["輔導", "班級經營"]}, {"url": "https://flipedu.parenting.com.tw/article/008855", "title": "暫停班上的告狀風暴：堵住惡意告狀、惡意報復的好方法", "author": "大坦誠", "date": "2023-12-13", "summary": const PER_PAGE = 12;
const PH = ['📖','💡','🏫','👥','✅','📋'];
let page = 1, searchQ = '', activeTag = 'all';

// 計算不重複作者數
const authors = new Set(DATA.map(a => a.author).filter(Boolean));
document.getElementById('authorCount').textContent = authors.size;

function filtered() {
  const q = searchQ.toLowerCase();
  return DATA.filter(a => {
    const matchQ = !q || (a.title + a.author + a.summary).toLowerCase().includes(q);
    // 親師溝通 / 法規流程 目前是預留 tag，暫時顯示全部
    const matchTag = activeTag === 'all'
      || a.tags.includes(activeTag)
      || activeTag === '親師溝通'
      || activeTag === '法規流程';
    return matchQ && matchTag;
  });
}

function renderCards() {
  const list = filtered();
  const total = list.length;
  const totalPages = Math.ceil(total / PER_PAGE);
  if (page > totalPages && totalPages > 0) page = totalPages;
  const slice = list.slice((page-1)*PER_PAGE, page*PER_PAGE);

  document.getElementById('resultCount').textContent = total + ' 篇';
  document.getElementById('secCount').textContent = '共 ' + total + ' 篇';

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!slice.length) {
    grid.innerHTML = '<div class="empty">找不到符合的文章，請試試其他關鍵字。</div>';
    renderPagination(total); return;
  }

  slice.forEach((a, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = a.url; card.target = '_blank'; card.rel = 'noopener noreferrer';
    const imgHTML = a.image
      ? `<img src="${a.image}" alt="${a.title}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      : '';
    const phStyle = a.image ? 'display:none' : '';
    const tagsHTML = a.tags.map(t => `<span class="card-otag">${t}</span>`).join('');
    card.innerHTML = `
      <div class="card-imgwrap">
        ${imgHTML}
        <div class="card-ph" style="${phStyle}">${PH[i%6]}</div>
        <div class="card-tags-overlay">${tagsHTML}</div>
      </div>
      <div class="card-body">
        <div class="card-date">${a.date}</div>
        <div class="card-ttl">${a.title}</div>
        <div class="card-summary">${a.summary}</div>
      </div>
      <div class="card-foot">
        <span class="card-author">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
          ${a.author}
        </span>
        <span class="card-readlink">閱讀全文
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
        </span>
      </div>`;
    grid.appendChild(card);
  });
  renderPagination(total);
}

function renderPagination(total) {
  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  const totalPages = Math.ceil(total / PER_PAGE);
  if (totalPages <= 1) return;
  const mk = (text, p, disabled, active) => {
    const b = document.createElement('button');
    b.className = 'page-btn' + (active ? ' active' : '');
    b.textContent = text; b.disabled = disabled || active;
    if (!disabled && !active) b.onclick = () => { page = p; renderCards(); window.scrollTo({top:0,behavior:'smooth'}); };
    return b;
  };
  const dots = () => { const s=document.createElement('span'); s.className='page-dots'; s.textContent='…'; return s; };
  pg.appendChild(mk('‹', page-1, page===1, false));
  const show = new Set([1,2,totalPages-1,totalPages,page-1,page,page+1].filter(p=>p>=1&&p<=totalPages));
  let last=0;
  [...show].sort((a,b)=>a-b).forEach(p=>{
    if(p>last+1) pg.appendChild(dots());
    pg.appendChild(mk(p,p,false,p===page));
    last=p;
  });
  pg.appendChild(mk('›', page+1, page===totalPages, false));
}

// TAG FILTER
document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTag = btn.dataset.tag;
    page = 1; renderCards();
  });
});

// SEARCH
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value; page = 1; renderCards();
});

renderCards();
</script>
