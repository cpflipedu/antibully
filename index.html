function parseSheet(raw){
  const j=JSON.parse(raw.replace(/^[^{]+/,'').replace(/[^}]+$/,''));
  const lb=j.table.cols.map(c=>c.label);
  const fi=n=>lb.findIndex(l=>l.trim()===n);
  const iU=fi('網址'),iT=fi('article_title--h1'),iI=fi('article_introduction');
  const iImg=fi('article_photo src'),iA=fi('article_author'),iD=fi('publish_time'),iF=fi('featured'),iTg=fi('tags');
  const seen=new Set();
  return j.table.rows.map(r=>{
    const c=r.c||[];
    const g=i=>(i>=0&&c[i]&&c[i].v!=null)?String(c[i].v).trim():'';
    const t=g(iT);if(!t||seen.has(t))return null;seen.add(t);
    const intro=g(iI);if(!intro)return null;
    const fv=g(iF).toLowerCase();
    const featured=['true','精選','yes','1'].includes(fv);
    let tags=['輔導','班級經營'];
    if(iTg>=0&&g(iTg))tags=g(iTg).split(/[,、，]+/).filter(Boolean);
    return{url:g(iU),title:t,author:g(iA),date:g(iD).substring(0,10),summary:intro.substring(0,220),image:g(iImg),tags,featured};
  }).filter(Boolean);
}

function buildHero(feat){
  const sl=document.getElementById('heroSlides'),dt=document.getElementById('heroDots');
  sl.innerHTML='';dt.innerHTML='';
  if(!feat.length){document.querySelector('.hero-wrap').style.display='none';return;}
  feat.forEach((a,i)=>{
    const s=document.createElement('div');
    s.className='hero-slide'+(i===0?' active':'');
    const hi=!!a.image;
    s.innerHTML='<div class="hero-img">'
      +(hi?'<img src="'+a.image+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">':'')
      +'<div class="hero-img-ph" style="'+(hi?'display:none':'')+'">&#x1F6E1;</div>'
      +'<span class="hero-badge">&#x7DE8;&#x8F2F;&#x7CBE;&#x9078;</span>'
      +'</div>'
      +'<div class="hero-body">'
      +'<div class="hero-cats">'+a.tags.map(t=>'<span class="hero-cat">'+t+'</span>').join('')+'</div>'
      +'<div class="hero-ttl">'+a.title+'</div>'
      +'<div class="hero-summary">'+a.summary+'</div>'
      +'<div class="hero-foot">'
      +'<div class="hero-author"><div class="hero-avatar"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:13px;height:13px"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg></div>'
      +'<span>'+(a.author||'&#x2014;')+'</span></div>'
      +'<a href="'+a.url+'" target="_blank" rel="noopener noreferrer" class="hero-readbtn">&#x95B1;&#x8B80;&#x5168;&#x6587; <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:13px;height:13px"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg></a>'
      +'</div></div>';
    sl.appendChild(s);
    const d=document.createElement('button');
    d.className='hero-dot'+(i===0?' active':'');
    d.onclick=()=>goHero(i);
    dt.appendChild(d);
  });
}

function goHero(i){
  const n=DATA.filter(a=>a.featured).length;
  heroIdx=((i%n)+n)%n;
  document.querySelectorAll('.hero-slide').forEach((s,j)=>s.classList.toggle('active',j===heroIdx));
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===heroIdx));
}
function startTimer(){
  if(heroTimer)clearInterval(heroTimer);
  if(DATA.filter(a=>a.featured).length>1)heroTimer=setInterval(()=>goHero(heroIdx+1),7000);
}
document.getElementById('heroPrev').onclick=()=>{goHero(heroIdx-1);startTimer()};
document.getElementById('heroNext').onclick=()=>{goHero(heroIdx+1);startTimer()};

function filtered(){
  const q=searchQ.toLowerCase();
  return DATA.filter(a=>{
    const mq=!q||(a.title+a.author+a.summary).toLowerCase().includes(q);
    const mt=activeTag==='all'||a.tags.includes(activeTag)||activeTag==='\u8614\u5e2b\u6e9d\u901a'||activeTag==='\u6cd5\u898f\u6d41\u7a0b';
    return mq&&mt;
  });
}

function renderCards(){
  const list=filtered(),total=list.length,tp=Math.ceil(total/PER_PAGE);
  if(page>tp&&tp>0)page=tp;
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const slice=list.slice((page-1)*PER_PAGE,page*PER_PAGE);
  if(!slice.length){grid.innerHTML='<div class="empty">&#x627E;&#x4E0D;&#x5230;&#x7B26;&#x5408;&#x7684;&#x6587;&#x7AE0;&#xFF0C;&#x8ACB;&#x8A66;&#x8A66;&#x5176;&#x4ED6;&#x95DC;&#x9375;&#x5B57;&#x3002;</div>';renderPag(total);return;}
  const PH=['&#x1F4D6;','&#x1F4A1;','&#x1F3EB;','&#x1F465;','&#x2705;','&#x1F4CB;'];
  slice.forEach((a,i)=>{
    const card=document.createElement('a');
    card.className='card'+(a.featured?' is-featured':'');
    card.href=a.url;card.target='_blank';card.rel='noopener noreferrer';
    const hi=!!a.image;
    const tags=a.tags.map(t=>'<span class="card-otag">'+t+'</span>').join('');
    card.innerHTML='<div class="card-imgwrap">'
      +(hi?'<img src="'+a.image+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">':'')
      +'<div class="card-ph" style="'+(hi?'display:none':'')+'">'+PH[i%6]+'</div>'
      +'<div class="card-overlay-tags">'+tags+'</div>'
      +'</div>'
      +'<div class="card-body">'
      +'<div class="card-date">'+a.date+'</div>'
      +'<div class="card-ttl">'+a.title+'</div>'
      +'<div class="card-summary">'+a.summary+'</div>'
      +'</div>'
      +'<div class="card-foot">'
      +'<span class="card-author"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>'+(a.author||'&#x2014;')+'</span>'
      +'<span class="card-readlink">&#x95B1;&#x8B80;&#x5168;&#x6587; <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg></span>'
      +'</div>';
    grid.appendChild(card);
  });
  renderPag(total);
}

function renderPag(total){
  const pg=document.getElementById('pagination');
  pg.innerHTML='';
  const tp=Math.ceil(total/PER_PAGE);
  if(tp<=1)return;
  const mk=(txt,p,dis,act)=>{const b=document.createElement('button');b.className='page-btn'+(act?' active':'');b.textContent=txt;b.disabled=dis||act;if(!dis&&!act)b.onclick=()=>{page=p;renderCards();window.scrollTo({top:0,behavior:'smooth'})};return b};
  const dots=()=>{const s=document.createElement('span');s.className='page-dots';s.textContent='...';return s};
  pg.appendChild(mk('<',page-1,page===1,false));
  const show=new Set([1,2,tp-1,tp,page-1,page,page+1].filter(p=>p>=1&&p<=tp));
  let last=0;
  [...show].sort((a,b)=>a-b).forEach(p=>{if(p>last+1)pg.appendChild(dots());pg.appendChild(mk(p,p,false,p===page));last=p});
  pg.appendChild(mk('>',page+1,page===tp,false));
}

async function loadData(){
  const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(SHEET_TAB);
  try{
    const res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    const parsed=parseSheet(text);
    if(parsed.length>0)DATA=parsed; else DATA=DEMO;
  }catch(e){DATA=DEMO;}
  buildHero(DATA.filter(a=>a.featured));
  startTimer();
  renderCards();
}

document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value;page=1;renderCards()});
document.querySelectorAll('.tag-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeTag=btn.dataset.tag;page=1;renderCards();
  });
});
loadData();
</script>
